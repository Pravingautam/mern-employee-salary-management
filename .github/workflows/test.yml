name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ""
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: db_penggajian3
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Backend
        working-directory: Backend
        run: npm install

      - name: Install Frontend
        working-directory: Frontend
        run: npm install

      - name: Install Tests
        working-directory: tests
        run: npm install

      - name: Install MySQL Client
        run: sudo apt-get update && sudo apt-get install -y mysql-client

      - name: Wait for MySQL
        run: |
          until mysql -h127.0.0.1 -uroot --protocol=tcp -e "SELECT 1"; do
            echo "Waiting for MySQL..."
            sleep 5
          done

      - name: Import Database
        run: |
          mysql -h127.0.0.1 -uroot db_penggajian3 < Backend/db/db_penggajian3.sql

      - name: Create .env
        working-directory: Backend
        run: |
          echo "APP_PORT=3000" > .env
          echo "SESS_SECRET=testsecret" >> .env

      - name: Install Playwright Browsers
        working-directory: tests
        run: npx playwright install --with-deps

      - name: Start Backend
        working-directory: Backend
        run: |
          npm start > server.log 2>&1 &
          sleep 15

      - name: Wait for Server
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:3000; then
              echo "Server Running"
              exit 0
            fi
            sleep 2
          done
          cat Backend/server.log
          exit 1

      - name: Run Playwright Tests
        working-directory: tests
        run: npx playwright test

      - name: Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report

      - name: Upload Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/test-results
